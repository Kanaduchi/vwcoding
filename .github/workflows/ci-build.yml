name: build

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Python runtime and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documents
        run: mkdocs build --clean

  bilingual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify language pairs exist
        run: python scripts/check_bilingual_docs.py --all

      - name: Verify Russian doc changes include English
        if: github.event_name == 'pull_request'
        run: python scripts/check_bilingual_docs.py --changed origin/${{ github.base_ref }}

  strict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Python runtime and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Strict build with warning whitelist
        run: python scripts/check_mkdocs_strict.py
